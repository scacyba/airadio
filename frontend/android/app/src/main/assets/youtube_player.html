<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <script src="https://www.youtube.com/iframe_api" referrerpolicy="strict-origin-when-cross-origin"></script>
</head>
<body style="margin:0;background:black;">
  <div id="player"></div>
  <script>
    let player;
    let currentVideoId = null;

    function playerOrigin() {
      return window.location.origin || 'https://airadio.local';
    }

    function markIframeWithReferrerPolicy() {
      const iframe = player && player.getIframe ? player.getIframe() : null;
      if (iframe) {
        iframe.setAttribute('referrerpolicy', 'strict-origin-when-cross-origin');
      }
    }

    function onYouTubeIframeAPIReady() {
      const origin = playerOrigin();
      player = new YT.Player('player', {
        width: '100%',
        height: '220',
        host: 'https://www.youtube.com',
        playerVars: {
          autoplay: 0,
          controls: 1,
          enablejsapi: 1,
          origin: origin,
          widget_referrer: origin
        },
        events: {
          onReady: () => {
            markIframeWithReferrerPolicy();
            AndroidBridge.onReady();
          },
          onStateChange: onPlayerStateChange,
          onError: (e) => AndroidBridge.onError(String(e.data))
        }
      });
      window.setTimeout(markIframeWithReferrerPolicy, 0);
    }

    function onPlayerStateChange(event) {
      const st = String(event.data);
      AndroidBridge.onStateChange(st);
      if (event.data === YT.PlayerState.ENDED) {
        AndroidBridge.onVideoEnded(currentVideoId);
      }
    }

    window.playVideoById = function(videoId) {
      currentVideoId = videoId;
      markIframeWithReferrerPolicy();
      player.loadVideoById(videoId);
    }

    window.pauseVideo = function() {
      if (player) player.pauseVideo();
    }
  </script>
</body>
</html>
