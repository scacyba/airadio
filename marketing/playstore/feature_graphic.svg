<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500" role="img" aria-labelledby="title desc">
  <title id="title">AI Radio feature graphic</title>
  <desc id="desc">A feature graphic for AI Radio showing a centered app preview, era chips, audio bars, and interlude news text-to-speech.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="0.58" stop-color="#16243D"/>
      <stop offset="1" stop-color="#0B1222"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style><![CDATA[
      .jp { font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", "Meiryo", system-ui, sans-serif; }
      .white { fill: #F8FAFC; }
      .muted { fill: #CBD5E1; }
      .blue { fill: #93C5FD; }
      .yellow { fill: #FCD34D; }
    ]]></style>
  </defs>
  <rect width="1024" height="500" fill="url(#bg)"/>
  <circle cx="144" cy="82" r="120" fill="#2563EB" opacity=".28"/>
  <circle cx="884" cy="422" r="150" fill="#16A34A" opacity=".24"/>
  <g filter="url(#shadow)">
    <rect x="352" y="54" width="320" height="392" rx="34" fill="#020617"/>
    <rect x="366" y="72" width="292" height="354" rx="24" fill="#0F172A"/>
    <text x="390" y="128" class="jp white" font-size="42" font-weight="800">AI Radio</text>
    <g>
      <rect x="390" y="158" width="58" height="34" rx="17" fill="#334155"/>
      <rect x="456" y="158" width="58" height="34" rx="17" fill="#2563EB"/>
      <rect x="522" y="158" width="58" height="34" rx="17" fill="#334155"/>
      <rect x="588" y="158" width="44" height="34" rx="17" fill="#334155"/>
      <text x="404" y="181" class="jp white" font-size="17" font-weight="700">70s</text>
      <text x="470" y="181" class="jp white" font-size="17" font-weight="700">80s</text>
      <text x="536" y="181" class="jp white" font-size="17" font-weight="700">90s</text>
      <text x="596" y="181" class="jp white" font-size="17" font-weight="700">00s</text>
    </g>
    <rect x="390" y="220" width="242" height="82" rx="16" fill="#111827"/>
    <rect x="410" y="282" width="202" height="5" rx="3" fill="#64748B"/>
    <rect x="410" y="282" width="118" height="5" rx="3" fill="#F43F5E"/>
    <path d="M501 243 L501 278 L532 260 Z" fill="#F8FAFC"/>
    <rect x="390" y="322" width="242" height="74" rx="16" fill="#1F2937"/>
    <text x="410" y="353" class="jp blue" font-size="22" font-weight="800">Now Playing</text>
    <text x="410" y="381" class="jp white" font-size="18">Interlude News TTS</text>
  </g>
  <g class="jp">
    <text x="80" y="206" class="white" font-size="54" font-weight="900">懐かしい音楽に、</text>
    <text x="80" y="274" class="yellow" font-size="54" font-weight="900">曲間ニュースを。</text>
    <text x="80" y="330" class="muted" font-size="28">年代を選んで、音楽とTTSニュースを楽しむラジオ体験</text>
  </g>
  <g transform="translate(742 162)">
    <rect x="0" y="0" width="208" height="174" rx="28" fill="#111827" opacity=".92"/>
    <rect x="36" y="46" width="18" height="86" rx="9" fill="#60A5FA"/>
    <rect x="70" y="20" width="18" height="112" rx="9" fill="#93C5FD"/>
    <rect x="104" y="64" width="18" height="68" rx="9" fill="#60A5FA"/>
    <rect x="138" y="34" width="18" height="98" rx="9" fill="#93C5FD"/>
  </g>
</svg>
