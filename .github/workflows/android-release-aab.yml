name: Android Release AAB

on:
  workflow_dispatch:

jobs:
  build-release-aab:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/android

    env:
      RADIO_API_BASE_URL: ${{ secrets.RADIO_API_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode upload keystore
        run: |
          mkdir -p app/keys
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > app/keys/anata-radio-upload-key.jks

      - name: Create keystore.properties
        run: |
          cat > keystore.properties <<EOF
          storeFile=app/keys/anata-radio-upload-key.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build release AAB
        run: ./gradlew clean bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: anata-radio-release-aab
          path: frontend/android/app/build/outputs/bundle/release/*.aab
