name: Android CI

on:
  pull_request:
    paths:
      - 'frontend/**'
      - '!**.md'    
      - '!**.json'    
  
  workflow_dispatch:

jobs:
  build:

    if: github.ref != 'refs/heads/notplaystore20260605'

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/android

    env:
      RADIO_API_BASE_URL: ${{ secrets.RADIO_API_BASE_URL_DEV }}
      FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Write Firebase config
        if: env.FIREBASE_GOOGLE_SERVICES_JSON != ''
        run: python3 scripts/write_google_services_json.py

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Gradle Build
        run: ./gradlew assembleDebug --stacktrace

      - name: Unit Test
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Lint
        run: ./gradlew lintDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: frontend/android/app/build/outputs/apk/debug/*.apk

